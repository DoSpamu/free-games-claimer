services:
  free-games-claimer:
    container_name: fgc
    build:
      context: https://github.com/DoSpamu/free-games-claimer.git#master
    restart: unless-stopped
    ports:
      - "6080:6080"   # noVNC — podgląd przeglądarki w kontenerze
    volumes:
      - fgc_data:/fgc/data

    # Wybierz platformy które chcesz — usuń lub dodaj: node steam-games; node aliexpress itd.
    # sleep 1d + restart: unless-stopped = uruchamia się codziennie automatycznie
    command: bash -c "node prime-gaming; node gog; node epic-games; node aliexpress; sleep 1d"

    environment:
      - LOG_LEVEL=INFO             # DEBUG | INFO | WARN | ERROR

      # ------ Discord webhook ------
      # - DISCORD_WEBHOOK=https://discord.com/api/webhooks/TWOJE_ID/TOKEN

      # ------ Apprise (alternatywne powiadomienia) ------
      # - NOTIFY=tgram://bottoken/chatid
      # - NOTIFY_TITLE=Free Games Claimer

      # ------ VNC ------
      - SHOW=1
      - WIDTH=1920
      - HEIGHT=1080
      # - VNC_PASSWORD=tajnehaslo   # zalecane — bez hasła noVNC jest otwarte!

      # ------ Dane logowania ------
      # - EMAIL=twoj@email.com
      # - PASSWORD=haslo

      # Epic Games
      # - EG_EMAIL=
      # - EG_PASSWORD=
      # - EG_OTPKEY=
      # - EG_PARENTALPIN=

      # Prime Gaming
      # - PG_EMAIL=
      # - PG_PASSWORD=
      # - PG_OTPKEY=
      # - PG_REDEEM=0
      # - PG_CLAIMDLC=0

      # GOG
      # - GOG_EMAIL=
      # - GOG_PASSWORD=

      # Steam
      # - STEAM_USERNAME=
      # - STEAM_PASSWORD=

      # ------ Inne ------
      # - TIMEOUT=60
      # - LOGIN_TIMEOUT=180

    healthcheck:
      test: curl --fail http://localhost:6080 || exit 1
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  fgc_data:
