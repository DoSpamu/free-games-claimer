services:
  free-games-claimer:
    container_name: fgc
    build:
      context: https://github.com/DoSpamu/free-games-claimer.git#master
    restart: unless-stopped
    ports:
      - "6080:6080"   # noVNC — podgląd przeglądarki w kontenerze
      - "8080:8080"   # health check / ręczne uruchomienie
    volumes:
      - fgc_data:/fgc/data
    environment:
      # ------ Scheduler ------
      - CRON_SCHEDULE=0 7 * * *    # codziennie o 07:00
      - TZ=Europe/Warsaw
      - RUN_ON_START=0             # 1 = uruchom też od razu po starcie
      - RETRY_FAILED=1             # 1 = ponów próbę po błędzie (po 30 min)
      - WEEKLY_DIGEST=1            # 1 = tygodniowe podsumowanie (niedz. 10:00)
      - HEALTH_PORT=8080
      - LOG_LEVEL=INFO             # DEBUG | INFO | WARN | ERROR

      # ------ Platformy (0 = wyłączona) ------
      - CLAIM_STEAM=1
      - CLAIM_EPIC=1
      - CLAIM_PRIME=1
      - CLAIM_GOG=1

      # ------ Discord webhook ------
      # - DISCORD_WEBHOOK=https://discord.com/api/webhooks/TWOJE_ID/TOKEN

      # ------ Apprise (alternatywne powiadomienia) ------
      # - NOTIFY=tgram://bottoken/chatid
      # - NOTIFY_TITLE=Free Games Claimer

      # ------ VNC ------
      - SHOW=1
      - WIDTH=1920
      - HEIGHT=1080
      # - VNC_PASSWORD=tajnehaslo   # zalecane — bez hasła noVNC jest otwarte!

      # ------ Dane logowania ------
      # Możesz ustawić wspólny EMAIL/PASSWORD dla wszystkich platform:
      # - EMAIL=twoj@email.com
      # - PASSWORD=haslo

      # Epic Games
      # - EG_EMAIL=
      # - EG_PASSWORD=
      # - EG_OTPKEY=
      # - EG_PARENTALPIN=

      # Prime Gaming
      # - PG_EMAIL=
      # - PG_PASSWORD=
      # - PG_OTPKEY=
      # - PG_REDEEM=0
      # - PG_CLAIMDLC=0

      # GOG
      # - GOG_EMAIL=
      # - GOG_PASSWORD=

      # Steam
      # - STEAM_USERNAME=
      # - STEAM_PASSWORD=

      # ------ Inne ------
      # - TIMEOUT=60
      # - LOGIN_TIMEOUT=180

    healthcheck:
      test: >
        curl --fail http://localhost:6080 &&
        curl --fail http://localhost:8080/health
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  fgc_data:
